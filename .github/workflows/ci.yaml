name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches:
      - '*'

jobs:
  build-test:
    runs-on: ubuntu-24.04 # may use an older version to test
    strategy:
      matrix:
        openfoam-version: [2406, 2412, 2506]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
      fail-fast: false
    name: Test with OpenFOAM ${{ matrix.openfoam-version }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up OpenFOAM
        uses: gerlero/setup-openfoam@v1
        with:
          openfoam-version: ${{ matrix.openfoam-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          # pybFoam compiles differently per OpenFOAM version (its CMake
          # bakes -DOPENFOAM=$FOAM_API and #ifdefs vary). uv's wheel cache
          # keys on package + python/platform tag only, so without this
          # suffix a pybFoam wheel built in one matrix cell (e.g. OF 2412)
          # gets reused in another (e.g. OF 2406), leaving undefined
          # symbols at runtime. Keying the cache by OF version gives each
          # cell its own built-wheel namespace.
          cache-suffix: of${{ matrix.openfoam-version }}

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: |
          uv run pip install -v .[all]

      - name: Test with pytest (serial)
        run: |
            uv run pytest -m "not parallel"

      - name: Test with pytest (parallel)
        run: |
            mpirun -np 2 --oversubscribe uv run pytest -m parallel
        env:
          OMPI_ALLOW_RUN_AS_ROOT: 1
          OMPI_ALLOW_RUN_AS_ROOT_CONFIRM: 1


  coverage:
    runs-on: ubuntu-24.04 # may use an older version to test

    name: Test coverage with OpenFOAM 2506 and Python 3.9
    steps:
      - uses: actions/checkout@v5

      - name: Set up OpenFOAM
        uses: gerlero/setup-openfoam@v1
        with:
          openfoam-version: 2506

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          # See note in build-test job: scope uv's wheel cache to the
          # OpenFOAM version so a pybFoam wheel from a different matrix
          # cell is never silently reused.
          cache-suffix: of2506

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: 3.9

      - name: Install test dependencies
        run: |
          uv run pip install -v .[all]

      - name: Test with pytest (serial)
        run: |
            uv run pytest -m "not parallel" --cov=pyOFTools --cov-report=xml

      - name: Test with pytest (parallel)
        run: |
            mpirun -np 2 --oversubscribe uv run pytest -m parallel
        env:
          OMPI_ALLOW_RUN_AS_ROOT: 1
          OMPI_ALLOW_RUN_AS_ROOT_CONFIRM: 1

      - name: Upload code coverage results to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}

  pre-commit-run:
    name: Pre-commit run
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5

    - name: Set up OpenFOAM
      uses: gerlero/setup-openfoam@v1
      with:
        openfoam-version: 2506

    - name: Install uv
      uses: astral-sh/setup-uv@v7

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install Python dependencies
      run: |
        uv sync --all-extras
    - name: Run pre-commit on all files
      run: uv run pre-commit run --all --color always --verbose
